name: GraphQL
description: GraphQL is a query language for APIs and a runtime for fulfilling those
  queries with existing data. Developed by Facebook in 2012 and open-sourced in 2015,
  GraphQL provides a complete and understandable description of the data in an API,
  gives clients the power to ask for exactly what they need, and enables powerful
  developer tools. It is maintained by the GraphQL Foundation under the Linux Foundation.
url: https://graphql.org/
